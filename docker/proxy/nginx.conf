# Routes *.localhost domains to the app container via in-network DNS.
# Domains served: orakul.localhost, app.localhost (and any other host on :80).

events {}

http {
    # Docker's embedded DNS resolves service names (e.g. "app").
    resolver 127.0.0.11 valid=10s;

    upstream orakul_app {
        server app:3001;
    }

    server {
        listen 80 default_server;
        server_name _;

        location / {
            proxy_pass         http://orakul_app;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_read_timeout 60s;
            proxy_send_timeout 60s;

            client_max_body_size 10m;  # matches express.json({ limit: '10mb' })
        }
    }
}
