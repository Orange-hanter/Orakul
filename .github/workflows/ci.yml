name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests + build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            app/package-lock.json
            app/client/package-lock.json

      - name: Install root deps
        working-directory: app
        run: npm ci

      - name: Install client deps
        working-directory: app/client
        run: npm ci

      - name: Run unit tests (node:test)
        working-directory: app
        run: npm test

      - name: Build client (Vite)
        working-directory: app/client
        run: npm run build

      - name: Smoke-check server.js syntax
        working-directory: app
        run: node -c server.js

      - name: Smoke-check backup script
        run: bash -n ops/backup-store.sh
